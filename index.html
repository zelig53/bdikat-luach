<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ספירה לאחור לחופשת לידה</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d81b60" />

    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ספירה לאחור לחופשת לידה">
    <link rel="apple-touch-icon" href="/icon.svg">

    <!-- Service Worker registration — חייב לקרות לפני כל דבר אחר -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw-custom.js', { scope: '/' })
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
